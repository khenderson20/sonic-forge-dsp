# =============================================================================
# SonicForge DSP — Continuous Integration
# =============================================================================
#
# Jobs
# ----
# 1. build-and-test   — compile + ctest on Linux (GCC & Clang), macOS, Windows
# 2. clang-format     — reject PRs that introduce style violations
# 3. clang-tidy       — static analysis on Linux/Clang
#
# Triggers
# --------
# • Every push to main / master
# • Every pull request targeting main / master

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# =============================================================================
# Job 1: Build & Test (matrix: OS × compiler)
# =============================================================================
jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux / GCC ──────────────────────────────────────────────
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            build_type: Debug

          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            build_type: Release

          # ── Linux / Clang ────────────────────────────────────────────
          - os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            build_type: Debug

          - os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            build_type: Release

          # ── macOS / AppleClang ───────────────────────────────────────
          - os: macos-14
            compiler: appleclang
            cc: clang
            cxx: clang++
            build_type: Debug

          - os: macos-14
            compiler: appleclang
            cc: clang
            cxx: clang++
            build_type: Release

          # ── Windows / MSVC ───────────────────────────────────────────
          # MSVC is discovered by CMake through the Visual Studio installation,
          # not via CC/CXX env vars.  We use the VS 2022 generator explicitly
          # so that CMake locates cl.exe without needing a developer shell.
          - os: windows-2022
            compiler: msvc
            build_type: Debug

          - os: windows-2022
            compiler: msvc
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── CPM source cache ───────────────────────────────────────────
      # Persists downloaded CPM packages across runs so CMake configure
      # does not re-fetch GoogleTest (and future deps) on every job.
      - name: Cache CPM packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/CPM
          key: cpm-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: cpm-${{ runner.os }}-

      - name: Prepare CPM cache dir
        if: runner.os != 'Windows'
        run: mkdir -p ~/.cache/CPM/cpm

      # ── Linux: install Clang-18 if needed ─────────────────────────
      - name: Install Clang-18 (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'clang'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main"
          sudo apt-get update -q
          sudo apt-get install -y clang-18

      # ── Configure: Linux / macOS ───────────────────────────────────
      # Use CC/CXX env vars to select the exact compiler for Unix targets.
      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CPM_SOURCE_CACHE: ~/.cache/CPM
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSONICFORGE_BUILD_TESTS=ON \
            -DSONICFORGE_BUILD_EXAMPLES=ON \
            -DSONICFORGE_OPTIMIZE_FOR_HOST=OFF

      # ── Configure: Windows / MSVC ──────────────────────────────────
      # On Windows, CMake discovers MSVC through the VS generator.
      # We do NOT set CC/CXX — those variables are irrelevant for the
      # Visual Studio generator and can confuse the toolchain detection.
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CPM_SOURCE_CACHE: ~/.cache/CPM
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DSONICFORGE_BUILD_TESTS=ON `
            -DSONICFORGE_BUILD_EXAMPLES=ON `
            -DSONICFORGE_OPTIMIZE_FOR_HOST=OFF

      # ── Build ──────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      # ── Test ───────────────────────────────────────────────────────
      - name: Run Tests
        working-directory: build
        run: ctest -C ${{ matrix.build_type }} --output-on-failure

  # ===========================================================================
  # Job 2: clang-format — enforce code style
  # ===========================================================================
  clang-format:
    name: clang-format style check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install clang-format-18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main"
          sudo apt-get update -q
          sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          # Collect all project C++ sources (exclude build directories)
          FILES=$(find include src tests examples web/src \
            -name "*.cpp" -o -name "*.hpp" -o -name "*.h" 2>/dev/null | sort)

          if [ -z "$FILES" ]; then
            echo "No C++ files found."
            exit 1
          fi

          echo "Checking formatting of:"
          echo "$FILES"

          # Non-zero exit means clang-format would change the file
          clang-format-18 --dry-run --Werror $FILES
          echo "All files are correctly formatted."

  # ===========================================================================
  # Job 3: clang-tidy — static analysis
  # ===========================================================================
  clang-tidy:
    name: clang-tidy static analysis
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── CPM source cache ─────────────────────────────────────────────
      - name: Cache CPM packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/CPM
          key: cpm-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: cpm-${{ runner.os }}-

      - name: Prepare CPM cache dir
        if: runner.os != 'Windows'
        run: mkdir -p ~/.cache/CPM/cpm

      - name: Install Clang-18 toolchain
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main"
          sudo apt-get update -q
          sudo apt-get install -y clang-18 clang-tidy-18

      # Generate compile_commands.json required by clang-tidy.
      # CPM_SOURCE_CACHE re-uses packages fetched by build-and-test.
      - name: Configure CMake (generate compile_commands.json)
        env:
          CC:  clang-18
          CXX: clang++-18
          CPM_SOURCE_CACHE: ~/.cache/CPM
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DSONICFORGE_BUILD_TESTS=ON \
            -DSONICFORGE_BUILD_EXAMPLES=ON

      # Run clang-tidy against the core library and tests only.
      # Examples are intentionally excluded to keep warnings focused.
      # --warnings-as-errors='*' ensures new violations fail the job
      # before they land on main.
      #
      # We rely on compile_commands.json (via -p build) for all include
      # paths — including GoogleTest headers fetched by CPM — so we do
      # NOT override flags with a trailing `--`.  HeaderFilterRegex in
      # .clang-tidy already restricts diagnostic reporting to project
      # headers (.*sonicforge.*), keeping third-party GTest headers quiet.
      - name: Run clang-tidy
        run: |
          clang-tidy-18 \
            --warnings-as-errors='*' \
            -p build \
            src/oscillator.cpp \
            src/state_variable_filter.cpp \
            src/delayline.cpp \
            tests/oscillator_test.cpp \
            tests/new_modules_test.cpp

  # ===========================================================================
  # Job 4: WebAssembly build — verify sonicforge_worklet.cpp compiles with Emscripten
  # ===========================================================================
  wasm-build:
    name: WebAssembly build (Emscripten)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure CMake (Emscripten)
        working-directory: web
        run: emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release

      - name: Build Wasm
        working-directory: web
        run: cmake --build build-web --parallel

  # ===========================================================================
  # Job 5: Deploy Doxygen API docs to GitHub Pages (push to main only)
  # ===========================================================================
  docs:
    name: Deploy API docs to GitHub Pages
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-and-test]

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen graphviz

      - name: Generate docs
        run: doxygen Doxyfile

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
